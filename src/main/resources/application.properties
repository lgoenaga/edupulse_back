spring.application.name=edupulse-back
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/edupulse_db}
spring.datasource.username=${DB_USERNAME:userdb_edupulse}
spring.datasource.password=${DB_PASSWORD:!#L@gp2026#!}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.security.jwt.secret=${JWT_SECRET:replace-with-a-long-random-secret-key-for-jwt}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
